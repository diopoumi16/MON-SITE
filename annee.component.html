
<div class="menu-buttons">
  <button class="btn profil py-1" (click)="goEvent($event)">Profil</button>
  <button class="btn classe" (click)="goEvent($event)">Classe</button>
  <button class="btn annee" (click)="goEvent($event)">Année</button>
  <button class="btn matiere" (click)="goEvent($event)">Matière</button>
  <form [formGroup]="anneeForm" class="flex justify-center gap-8 items-center aligns-items-center" (ngSubmit)="postAnnee()">
   
   
   
    <div class="mb-4">
   
      <input type="text"
      id="=libelle"
             formControlName="libelle"
             [attr.placeholder]="placeholderTexte"
           
             class="w-full px-16 border rounded p-3">
    </div>

    <div>
        <button type="submit"
        [ngClass]="{
              'bg-gray-400 ': anneeForm.invalid,
              'bg-blue-600': anneeForm.valid
            }"
            class="w-full btn -mt-6 text-white p-3 rounded"
            [disabled]="anneeForm.invalid">
      {{btn}}
    </button>
    </div>
  </form>
</div>

<div class="max-w-4xl mx-auto p-6 bg-white rounded-lg shadow">
  

  <!-- <hr class="my-2"> -->

  <table class="w-full table-auto w-full text-sm text-left rtl:text-right text-body border border-gray-200">
    <thead class="bg-gray-100 text-sm text-body bg-neutral-secondary-soft border-b rounded-base border-default ">
      <tr>
        <th class="border p-2 text-center">Libellé</th>
        <th class="border p-2 text-center">Statut</th>
        <th class="border p-2 text-center">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let annee of annees(); let i = index">
        <td class="border text-center p-2">{{ annee.libelle }}</td>
       


        <td class="border text-center p-2">
          <span
            class="px-2 py-1 rounded text-sm"
            [ngClass]="{
              'bg-green-100 text-green-700': annee.etat,
              'bg-red-100 text-red-700': !annee.etat 
            }">
            <span *ngIf="!annee.etat">Inactive</span>
            <span *ngIf="annee.etat">Active</span>
          </span>
        </td>

        <td class="border p-2 text-center space-x-3">
          <!-- Modifier -->
          <button (click)="modifierAnnee(annee)"
                  class="text-blue-600">
            ✏️
          </button>

          <!-- Supprimer -->
          <button (click)="supprimerAnnee(annee)"
                  class="text-red-600">
            🗑️
          </button>
           <i class="fas" (click)="activerAnnee(annee)"
     [ngClass]="{
       'fa-check-circle text-green-600': !annee.etat,
       'fa-times-circle text-red-600': annee.etat
     }">
  </i>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="annees().length === 0"
     class="text-center text-gray-500 mt-4">
    Aucune année enregistrée
  </p>

</div>
