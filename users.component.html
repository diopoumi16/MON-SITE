

<div class="max-w-md mx-auto p-6 bg-white rounded-xl shadow">
  <h2 class="text-2xl font-bold mb-4">Créer un utilisateur</h2>

  <form class="space-y-4">

        <div>
      <label class="block mb-2 text-sm font-medium">Profil</label>
      <select class="block w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50">
        <option disabled selected>Selectionner un profil</option>
        <option value="eleve">Eleve</option>
        <option value="Professeur">Professeur</option>
         <option value="surveillant">Surveillant</option>
        
      </select>
    </div>



    <!-- Nom -->
   
    <div>
      <label for="nom" class="block mb-2 text-sm font-medium text-gray-900">Nom Complet</label>
      <input type="text" id="nom"
             class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
             placeholder="Khady ..." required>
    </div>
    

    <!-- Telephone-Email -->
    <div>
      <label for="telephone" class="block mb-2 text-sm font-medium text-gray-900">Telephone</label>
      <input type="telephone" id="telephone"
             class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
             placeholder="766221096" required>
    </div>
    <div>
      <label for="email" class="block mb-2 text-sm font-medium text-gray-900">Email</label>
      <input type="email" id="email"
             class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
             placeholder="exemple@gmail.com" required>
    </div>

 <div>
      <label class="block mb-2 text-sm font-medium">Classe</label>
      <select class="block w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50">
        <option disabled selected>Selectionner une classe</option>
        <option value="6em A">6em A</option>
        <option value="6em B">6em B</option>
         <option value="6em C">6em C</option>
        
      </select>
    </div>
    <!-- Bouton -->
    <button type="submit"
            class="w-full text-white bg-blue-600 hover:bg-blue-700 font-medium rounded-lg text-sm px-5 py-2.5 text-center">
      S’inscrire
    </button>

  </form>
</div>
