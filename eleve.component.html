<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription Élève - EduIA Collège</title>

<link href="https://lequotidien.sn/utilisation-de-lintelligence-artificielle-lia-fait-sa-rentree-scolaire/" rel="stylesheet">

</head>

<body>



<div class="main">

    <div class="form-section">
        <h1>Inscription Élève</h1>
        <p class="subtitle">Crée ton compte pour accéder aux vidéos interactives éducatives.</p>

        <div class="section-title">Informations personnelles</div>
        <div class="form-group">
            <input type="text" placeholder="Prénom">
            <input type="text" placeholder="Nom">
        </div>
        <div class="form-group">
            <input type="date">
            <select>
                <option>Sexe</option>
                <option>Masculin</option>
                <option>Féminin</option>
            </select>
        </div>

        <div class="section-title">Informations scolaires</div>
        <select>
            <option>Classe</option>
            <option>6e</option>
            <option>5e</option>
            <option>4e</option>
            <option>3e</option>
        </select>
        <input type="text" placeholder="Établissement">
        <input type="text" placeholder="Numéro matricule">

        <div class="section-title">Informations de connexion</div>
        <input type="email" placeholder="Email ou téléphone">
        <input type="password" placeholder="Mot de passe">
        <input type="password" placeholder="Confirmer le mot de passe">

        <div class="checkbox">
            <input type="checkbox"> J’accepte les conditions d’utilisation
        </div>

        <button>S’inscrire</button>

        <div class="login-link">
            Déjà un compte ? <a href="#">Se connecter</a>
        </div>
    </div>

    <div class="image-section">
        <!-- Remplace le lien par ton image générée -->
        <img src="../assets/IA-ET-SCOLARTE.jpg"/>
    </div>

</div>

</body>
</html>
